<!-- 
- Ask the user inputs their choice 
- The computer will give you an answer either "Rock", "Paper" and "scissors"
*- Using if else statements rock beats scissors, paper beats rock, scissors beat paper 
* -The answers will either result in a win a tie or a loss according to what the user inputs 
- The computer should keep track of the score for both the user and the computer
- Game loops  
- score will go up to 5


     

-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function getComputerChoice() {
            const choices = ['rock', 'paper', 'scissors'];
            const randomIndex = Math.floor(Math.random() * choices.length);
            return choices[randomIndex];
        }

        function getHumanChoice() {
            const userInput = prompt("Choose rock, paper, or scissors:");
            return userInput ? userInput.toLowerCase() : null;
        }

        humanScore = 0;
        computerScore = 0;

        function playRound(playerSelection, computerSelection) {
            if (playerSelection === computerSelection) {
                return "It's a tie!";
            } else if (
                (playerSelection === 'rock' && computerSelection === 'scissors') ||
                (playerSelection === 'paper' && computerSelection === 'rock') ||
                (playerSelection === 'scissors' && computerSelection === 'paper')
            ) {
                return "You win! " + playerSelection + " beats " + computerSelection;
            } else {
                return "You lose! " + computerSelection + " beats " + playerSelection;
            }
        }
        console.log(playRound(getHumanChoice(), getComputerChoice()));

        function playGame() {
            for (let i = 0; i < 5; i++) {
                const playerSelection = getHumanChoice();
                const computerSelection = getComputerChoice();
                const result = playRound(playerSelection, computerSelection);

            }
        }
    </script>
